<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 440" width="840" height="440">
  <!--
    Massstab: 1 m = 20 px
    Spielfeld: 40 m x 20 m = 800 x 400 px, Ursprung (20, 20)
    Quellen: IFF Rules of the Game 2026

    Masse:
      Torraum (Crease):        4 m tief x 5 m breit, Hinterlinie 2.85 m von Bande
      Torhüterraum:            1 m tief x 2.5 m breit, 0.65 m vor Torraum-Hinterlinie
      Torlinie:                = Hinterlinie Torhüterraum (3.5 m von Bande)
      Torkäfig:                1.6 m breit x 0.65 m tief (zwischen Torraum-Hl. und Torlinie)
      Anspielpunkte:           1.5 m von Seitenbande, auf Torlinienverlängerung + Mittellinie
  -->

  <!-- Boden -->
  <rect width="840" height="440" fill="#1A5FAD"/>

  <!-- Spielfeld-Banden -->
  <rect x="20" y="20" width="800" height="400" rx="20" ry="20" fill="none" stroke="white" stroke-width="4"/>

  <!-- Mittellinie -->
  <line x1="420" y1="20" x2="420" y2="420" stroke="white" stroke-width="2.5"/>

  <!-- Anspielkreis (r = 3 m = 60 px) -->
  <circle cx="420" cy="220" r="60" fill="none" stroke="white" stroke-width="2.5"/>

  <!-- Mittelpunkt -->
  <circle cx="420" cy="220" r="5" fill="white"/>


  <!-- ================================================================ -->
  <!-- LINKES TORENDE                                                     -->
  <!-- ================================================================ -->

  <!--
    Torraum-Hinterlinie (Bande-Seite): x = 20 + 2.85*20 = 77
    Torraum-Vorderlinie (Feld-Seite):  x = 77 + 4*20   = 157
    Torraum Breite 5 m: y = 220 +/- 50  =  170 bis 270
  -->
  <rect x="77" y="170" width="80" height="100" fill="none" stroke="white" stroke-width="2.5"/>

  <!--
    Torhüterraum: 0.65 m vor Torraum-Hinterlinie = x=90 (Torlinie)
    1 m tief = x=90..110, Breite 2.5 m: y=195..245
  -->
  <rect x="90" y="195" width="20" height="50" fill="none" stroke="white" stroke-width="2.5"/>

  <!--
    Torkäfig (Draufsicht): zwischen Torraum-Hinterlinie (x=77) und Torlinie (x=90)
    Breite 1.6 m = 32 px, y = 220 +/- 16 = 204..236
  -->
  <line x1="77" y1="204" x2="90" y2="204" stroke="white" stroke-width="3"/>
  <line x1="77" y1="236" x2="90" y2="236" stroke="white" stroke-width="3"/>


  <!-- ================================================================ -->
  <!-- RECHTES TORENDE (gespiegelt)                                       -->
  <!-- ================================================================ -->

  <rect x="683" y="170" width="80" height="100" fill="none" stroke="white" stroke-width="2.5"/>
  <rect x="730" y="195" width="20" height="50" fill="none" stroke="white" stroke-width="2.5"/>
  <line x1="750" y1="204" x2="763" y2="204" stroke="white" stroke-width="3"/>
  <line x1="750" y1="236" x2="763" y2="236" stroke="white" stroke-width="3"/>


  <!-- ================================================================ -->
  <!-- ANSPIELPUNKTE (6 Punkte + Mittelpunkt)                            -->
  <!-- 1.5 m von Seitenbande = 30 px: y = 50 (oben) und y = 390 (unten) -->
  <!-- ================================================================ -->

  <circle cx="90"  cy="50"  r="5" fill="white"/>
  <circle cx="90"  cy="390" r="5" fill="white"/>
  <circle cx="420" cy="50"  r="5" fill="white"/>
  <circle cx="420" cy="390" r="5" fill="white"/>
  <circle cx="750" cy="50"  r="5" fill="white"/>
  <circle cx="750" cy="390" r="5" fill="white"/>

</svg>
