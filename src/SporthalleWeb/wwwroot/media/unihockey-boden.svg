<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 440" role="img" aria-label="Unihockey-Spielfeld">
  <!-- Field background -->
  <rect x="20" y="20" width="800" height="400" fill="#2d6a2d" rx="6"/>

  <!-- Field border -->
  <rect x="20" y="20" width="800" height="400" fill="none" stroke="white" stroke-width="3" rx="6"/>

  <!-- Center line -->
  <line x1="420" y1="20" x2="420" y2="420" stroke="white" stroke-width="2"/>

  <!-- Center circle -->
  <circle cx="420" cy="220" r="60" fill="none" stroke="white" stroke-width="2"/>
  <circle cx="420" cy="220" r="3" fill="white"/>

  <!-- Goal crease left (semi-circle, flipped right) -->
  <path d="M 20 140 A 80 80 0 0 1 20 300" fill="none" stroke="white" stroke-width="2"/>
  <line x1="20" y1="140" x2="77" y2="140" stroke="white" stroke-width="2"/>
  <line x1="20" y1="300" x2="77" y2="300" stroke="white" stroke-width="2"/>

  <!-- Goal crease right -->
  <path d="M 820 140 A 80 80 0 0 0 820 300" fill="none" stroke="white" stroke-width="2"/>
  <line x1="820" y1="140" x2="763" y2="140" stroke="white" stroke-width="2"/>
  <line x1="820" y1="300" x2="763" y2="300" stroke="white" stroke-width="2"/>

  <!-- Goal boxes -->
  <rect x="3" y="175" width="17" height="90" fill="none" stroke="white" stroke-width="2"/>
  <rect x="820" y="175" width="17" height="90" fill="none" stroke="white" stroke-width="2"/>

  <!-- Face-off spots (left side) -->
  <circle cx="100" cy="113" r="5" fill="white"/>
  <circle cx="100" cy="327" r="5" fill="white"/>
  <!-- Face-off spots (right side) -->
  <circle cx="740" cy="113" r="5" fill="white"/>
  <circle cx="740" cy="327" r="5" fill="white"/>
  <!-- Center face-off spots (top/bottom) -->
  <circle cx="420" cy="113" r="5" fill="white"/>
  <circle cx="420" cy="327" r="5" fill="white"/>
</svg>
