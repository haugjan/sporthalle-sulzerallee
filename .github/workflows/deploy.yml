name: Deploy to Azure

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Restore
        run: dotnet restore src/SporthalleWeb/SporthalleWeb.csproj

      - name: Build
        run: dotnet build src/SporthalleWeb/SporthalleWeb.csproj --configuration Release --no-restore

      - name: Publish
        run: dotnet publish src/SporthalleWeb/SporthalleWeb.csproj --configuration Release --output ./publish --no-build

      - name: Package and deploy via Kudu ZipDeploy
        run: |
          cd ./publish && zip -r ../app.zip . && cd ..
          curl -X POST \
            -u "${{ secrets.KUDU_USER }}:${{ secrets.KUDU_PASS }}" \
            "https://app-sporthalle-sulzerallee.scm.azurewebsites.net/api/zipdeploy" \
            --data-binary @app.zip \
            --fail \
            -o /dev/null \
            -w "HTTP Status: %{http_code}\n"
